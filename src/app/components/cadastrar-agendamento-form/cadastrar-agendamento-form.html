<div class="p-6">
  <div class="mb-6 flex items-center justify-between">
    <h2 class="text-xl font-bold text-slate-800">Nova Consulta</h2>

    <button type="button" (click)="fechar.emit()" class="text-slate-400 hover:text-slate-600">
      <lucide-icon [img]="icons.X" [size]="20"></lucide-icon>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="salvar()" class="space-y-5">
    <div class="space-y-1">
      <label class="ml-1 text-[10px] font-bold text-slate-400 uppercase">
        O que você precisa?
      </label>

      <input
        formControlName="especialidade"
        class="h-12 w-full rounded-xl border border-slate-200 bg-slate-50 px-4 text-sm font-medium outline-none focus:ring-2 focus:ring-medix-600/20"
        placeholder="Ex: Cardiologia, Exame de Sangue..."
      />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="space-y-1">
        <label class="ml-1 text-[10px] font-bold text-slate-400 uppercase"> Unidade </label>

        <select
          formControlName="unidadeId"
          class="h-12 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 text-xs font-bold outline-none"
        >
          <option [value]="null" disabled>Selecione...</option>

          @for (u of unidades(); track u.id) {
            <option [value]="u.id">{{ u.nome }}</option>
          }
        </select>
      </div>

      <div class="space-y-1">
        <label class="ml-1 text-[10px] font-bold text-slate-400 uppercase"> Médico </label>

        <select
          formControlName="medicoId"
          class="h-12 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 text-xs font-bold outline-none"
        >
          <option [value]="null" disabled>Selecione...</option>

          @for (m of medicos(); track m.id) {
            <option [value]="m.id">{{ m.nome }}</option>
          }
        </select>
      </div>
    </div>

    <div class="space-y-1">
      <label class="ml-1 text-[10px] font-bold text-slate-400 uppercase"> Data da Consulta </label>

      <input
        type="date"
        formControlName="data"
        class="h-12 w-full rounded-xl border border-slate-200 bg-slate-50 px-4 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-medix-600/20"
      />
    </div>

    <div class="space-y-2">
      <label class="ml-1 text-[10px] font-bold text-slate-400 uppercase">
        Horários Disponíveis
      </label>

      <div class="grid grid-cols-4 gap-2">
        @for (hora of horariosDisponiveis; track hora) {
          <button
            type="button"
            (click)="selecionarHorario(hora)"
            [class]="
              horarioSelecionado() === hora
                ? 'bg-medix-600 text-white border-medix-600'
                : 'bg-white text-slate-600 border-slate-200 hover:border-medix-300'
            "
            class="rounded-lg border py-2 text-xs font-bold transition-all"
          >
            {{ hora }}
          </button>
        }
      </div>
    </div>

    <button
      type="submit"
      [disabled]="form.invalid || !horarioSelecionado()"
      class="mt-4 w-full rounded-xl bg-medix-600 py-4 text-sm font-bold tracking-widest text-white uppercase shadow-lg shadow-medix-600/10 transition-all hover:bg-medix-700 disabled:opacity-50"
    >
      Confirmar Agendamento
    </button>
  </form>
</div>
